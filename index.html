<!DOCTYPE html>

<html>

<head>

    <title>Number Guess</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Number Guess</h1>

        <p id="question">
            Think of a number between 1 and 100
        </p>

        <button id="doneButton">
            Done
        </button>

        <button id="yesButton">
            Yes
        </button>

        <button id="noButton">
            No
        </button>

        <button id="playAgainButton">
            Play Again
        </button>

        <p id="madeBy">
            Made by dot
        </p>

    </div>

    <script src="script.js"></script>

</body>

</html>
