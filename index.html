<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Number Guess </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1 id="question">
            Think of a number between 1 and 1000
        </h1>

        <button id="startButton" class="start">
            Done
        </button>

        <div id="gameButtons" style="display:none;">

            <button class="yes" onclick="yesAnswer()">
                Yes
            </button>

            <button class="no" onclick="noAnswer()">
                No
            </button>

        </div>

        <button id="playAgainButton"
        class="playagain"
        style="display:none;"
        onclick="resetGame()">

            Play Again

        </button>

        <div class="madeby">
            Made by dot
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
